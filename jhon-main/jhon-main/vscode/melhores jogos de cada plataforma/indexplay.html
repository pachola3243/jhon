<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melhores Jogos por Plataforma</title>
<link rel="stylesheet" href="style.play.css">
</head>
<body>
    <div class="container">
        <h1>🏆 Melhores Jogos por Plataforma</h1>
        <p class="subtitle">Descubra os títulos imperdíveis de cada console e PC</p>

        <div class="platforms-grid" id="platformsGrid">
            <!-- Conteúdo será inserido via JavaScript -->
        </div>

        <div class="stats">
            <div class="stat-card">
                <span class="stat-number" id="totalGames">24</span>
                <span class="stat-label">Jogos Listados</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">+95%</span>
                <span class="stat-label">Avaliação Média</span>
            </div>
            <div class="stat-card">
                <span class="stat-number">2023-2024</span>
                <span class="stat-label">Geração Atual</span>
            </div>
        </div>
    </div>

    <script>
        const platforms = [
            {
                name: "PlayStation 5",
                icon: "🟦",
                class: "ps5",
                games: [
                    "God of War Ragnarök (2022)",
                    "Spider-Man 2 (2023)",
                    "The Last of Us Part I (2022)"
                ]
            },
            {
                name: "Xbox Series X|S",
                icon: "🟢",
                class: "xbox",
                games: [
                    "Starfield (2023)",
                    "Forza Horizon 5 (2021)",
                    "Halo Infinite (2021)"
                ]
            },
            {
                name: "Nintendo Switch",
                icon: "🔴",
                class: "switch",
                games: [
                    "The Legend of Zelda: Tears of the Kingdom (2023)",
                    "Super Mario Bros. Wonder (2023)",
                    "Metroid Dread (2021)"
                ]
            },
            {
                name: "PC Gaming",
                icon: "💻",
                class: "pc",
                games: [
                    "Baldur's Gate 3 (2023)",
                    "Cyberpunk 2077 (2020/2023)",
                    "Elden Ring (2022)"
                ]
            }
        ];

        function createPlatformCard(platform) {
            return `
                <div class="platform-card" onclick="expandCard(this)">
                    <div class="platform-icon ${platform.class}">${platform.icon}</div>
                    <h3 class="platform-name">${platform.name}</h3>
                    <ul class="games-list">
                        ${platform.games.map((game, index) => 
                            `<li class="game-item" style="animation-delay: ${0.1 + index * 0.1}s">
                                <div class="game-title">${game.split(' (')[0]}</div>
                                <div class="game-year">${game.split(' (')[1]?.replace(')', '') || ''}</div>
                            </li>`
                        ).join('')}
                    </ul>
                </div>
            `;
        }

        function initPlatforms() {
            const grid = document.getElementById('platformsGrid');
            grid.innerHTML = platforms.map(createPlatformCard).join('');
        }

        function expandCard(card) {
            card.style.transform = 'scale(1.05)';
            setTimeout(() => {
                card.style.transform = 'translateY(-10px)';
            }, 150);
            
            // Adiciona efeito de partículas
            createParticles(card);
        }

        function createParticles(element) {
            for(let i = 0; i < 10; i++) {
                const particle = document.createElement('div');
                particle.style.cssText = `
                    position: absolute;
                    width: 6px;
                    height: 6px;
                    background: #4ecdc4;
                    border-radius: 50%;
                    pointer-events: none;
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    animation: float 1s ease-out forwards;
                `;
                
                element.appendChild(particle);
                
                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // Animação CSS para partículas
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float {
                0% { transform: translateY(0) scale(1); opacity: 1; }
                100% { transform: translateY(-50px) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Inicializar ao carregar
        window.addEventListener('load', initPlatforms);

        // Animação de entrada dos cards
        window.addEventListener('load', () => {
            const cards = document.querySelectorAll('.platform-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(50px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.8s ease';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 200);
            });
        });
    </script>
</body>
</html>
